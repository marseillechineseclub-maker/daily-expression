<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expression - Learn English Every Day</title>
    <style>
        :root {
            --bg-cream: #FAF9F6;
            --bg-white: #FFFFFF;
            --text-dark: #333333;
            --text-medium: #666666;
            --text-light: #999999;
            --accent-sage: #8BA888;
            --accent-sage-light: #a8c4a5;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        header {
            max-width: 800px;
            width: 100%;
            margin: 0 auto 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-sage);
        }

        .header-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .streak {
            font-size: 0.95rem;
            color: var(--text-medium);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .streak-number {
            font-weight: 600;
            color: var(--accent-sage);
        }

        .settings-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-medium);
            transition: color 0.3s ease;
            padding: 0.5rem;
        }

        .settings-btn:hover {
            color: var(--accent-sage);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            padding: 3.5rem;
            max-width: 700px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .expression {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .meaning {
            font-size: 1.1rem;
            color: var(--text-medium);
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-cream);
            border-radius: 12px;
            border-left: 4px solid var(--accent-sage);
        }

        .examples {
            margin-bottom: 2.5rem;
        }

        .examples-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-medium);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .example {
            font-size: 1rem;
            color: var(--text-medium);
            margin-bottom: 0.75rem;
            padding-left: 1.5rem;
            position: relative;
            line-height: 1.7;
        }

        .example::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-sage);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent-sage);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-sage-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary {
            background: var(--bg-cream);
            color: var(--text-medium);
        }

        .btn-secondary:hover {
            background: #f0efec;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            transform: none;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e8e8e8;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent-sage);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.3s ease;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--bg-cream);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .progress-bar {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e8e8e8;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .progress-track {
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-sage);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .modal-section {
            margin-bottom: 1.5rem;
        }

        .modal-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-medium);
            margin-bottom: 0.5rem;
        }

        .modal-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent-sage);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .notification-badge {
            display: inline-block;
            background: var(--accent-sage);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                padding: 2rem;
            }

            .expression {
                font-size: 2rem;
            }

            header {
                margin-bottom: 1rem;
            }

            .streak {
                font-size: 0.85rem;
            }

            .actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .expression {
                font-size: 1.75rem;
            }

            .card {
                padding: 1.5rem;
            }

            .logo {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <header>

    <main>

            <div class="actions">

            </div>

            <div class="navigation">

                <button class="nav-btn" id="nextBtn">Next →</button>
            </div>

            <div class="progress-bar">
                <div class="progress-info">
                    <span id="learnedCount">0 expressions learned</span>
                    <span id="totalCount">0 total</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->

            </div>

            <div class="modal-section">
                <label class="modal-label">Browser Notifications</label>
                <button class="btn btn-secondary" id="enableNotifications" style="width: 100%;">
                    Enable Notifications
                </button>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" id="saveSettings">Save Settings</button>
                <button class="btn btn-secondary" id="closeModal">Cancel</button>
            </div>
        </div>
    </div>

                    "I'll keep my eyes peeled for any good deals."
                ]
            },
            {
                expression: "Make a long story short",
                meaning: "To tell something briefly, leaving out details.",
                examples: [
                    "To make a long story short, we got lost and arrived two hours late.",
                    "Let me make a long story short - the project failed.",
                    "Making a long story short, I decided to accept the job offer."
                ]
            },
            {
                expression: "No pain, no gain",
                meaning: "You have to work hard or suffer to achieve something worthwhile.",
                examples: [
                    "I'm sore from the workout, but no pain, no gain!",
                    "Learning a new language is hard, but no pain, no gain.",
                    "It's tough now, but remember - no pain, no gain."
                ]
            },
            {
                expression: "On the same page",
                meaning: "To have the same understanding or opinion about something.",
                examples: [
                    "Let's meet to make sure we're all on the same page.",
                    "I think we're on the same page about the project goals.",
                    "Are we on the same page about the deadline?"
                ]
            },
            {
                expression: "Par for the course",
                meaning: "What is normal or expected in a particular situation.",
                examples: [
                    "Delays are par for the course with this airline.",
                    "Technical issues on launch day are par for the course.",
                    "Complaints from that client are par for the course."
                ]
            },
            {
                expression: "Pull someone's leg",
                meaning: "To joke with or tease someone in a playful way.",
                examples: [
                    "I'm just pulling your leg - I didn't really sell your car!",
                    "Are you serious or just pulling my leg?",
                    "He loves pulling people's legs with outrageous stories."
                ]
            },
            {
                expression: "Get cold feet",
                meaning: "To become nervous or anxious about something you planned to do, often leading to hesitation or withdrawal.",
                examples: [
                    "He got cold feet about the presentation and almost canceled.",
                    "Many couples get cold feet before their wedding.",
                    "Don't get cold feet now - you've prepared well for this!"
                ]
            },
            {
                expression: "Actions speak louder than words",
                meaning: "What you do is more important and shows your true intentions better than what you say.",
                examples: [
                    "He says he'll help, but actions speak louder than words.",
                    "Don't just promise to change - actions speak louder than words.",
                    "She proved that actions speak louder than words by volunteering every week."
                ]
            }
        ];

        // ==================== STATE ====================
        let currentIndex = 0;
        let learnedExpressions = new Set();
        let streak = 0;
        let lastVisitDate = null;

        // ==================== INITIALIZATION ====================
        function init() {
            loadFromLocalStorage();
            updateStreak();
            currentIndex = getDailyExpressionIndex();
            displayExpression(currentIndex);
            updateProgressBar();
            setupEventListeners();
        }

        // ==================== LOCAL STORAGE ====================
        function loadFromLocalStorage() {
            const stored = localStorage.getItem('expressionAppData');
            if (stored) {
                const data = JSON.parse(stored);
                learnedExpressions = new Set(data.learned || []);
                streak = data.streak || 0;
                lastVisitDate = data.lastVisit || null;
            }
        }

        function saveToLocalStorage() {
            const data = {
                learned: Array.from(learnedExpressions),
                streak: streak,
                lastVisit: getTodayString()
            };
            localStorage.setItem('expressionAppData', JSON.stringify(data));
        }

        // ==================== DATE FUNCTIONS ====================
        function getTodayString() {
            const today = new Date();
            return today.toISOString().split('T')[0]; // YYYY-MM-DD
        }

        function getFormattedDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('en-US', options);
        }

        function getDailyExpressionIndex() {
            // Calculate days since epoch
            const today = new Date();
            const epoch = new Date('2024-01-01');
            const daysSinceEpoch = Math.floor((today - epoch) / (1000 * 60 * 60 * 24));
            return daysSinceEpoch % expressions.length;
        }

        function updateStreak() {
            const today = getTodayString();

            if (!lastVisitDate) {
                streak = 1;
            } else if (lastVisitDate !== today) {
                const lastDate = new Date(lastVisitDate);
                const currentDate = new Date(today);
                const diffTime = currentDate - lastDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 1) {
                    streak++;
                } else if (diffDays > 1) {
                    streak = 1;
                }
            }

            lastVisitDate = today;
            saveToLocalStorage();

            const streakNum = document.querySelector('.streak-number');
            const streakDisplay = document.getElementById('streakDisplay');
            streakNum.textContent = streak;

            if (streak === 1) {
                streakDisplay.innerHTML = `🔥 <span class="streak-number">${streak}</span> day streak`;
            } else {
                streakDisplay.innerHTML = `🔥 <span class="streak-number">${streak}</span> day streak`;
            }
        }

        // ==================== DISPLAY FUNCTIONS ====================
        function displayExpression(index) {
            const expr = expressions[index];

            document.getElementById('dateDisplay').textContent = getFormattedDate();
            document.getElementById('expressionText').textContent = expr.expression;
            document.getElementById('meaningText').textContent = expr.meaning;

            const examplesContainer = document.getElementById('examplesContainer');
            examplesContainer.innerHTML = '';
            expr.examples.forEach(example => {
                const div = document.createElement('div');
                div.className = 'example';
                div.textContent = example;
                examplesContainer.appendChild(div);
            });

            // Update learned button state
            const learnedBtn = document.getElementById('learnedBtn');
            if (learnedExpressions.has(index)) {
                learnedBtn.textContent = 'Learned ✓';
                learnedBtn.disabled = true;
            } else {
                learnedBtn.textContent = 'Mark as Learned ✓';
                learnedBtn.disabled = false;
            }

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === expressions.length - 1;
        }

        function updateProgressBar() {
            const learned = learnedExpressions.size;
            const total = expressions.length;
            const percentage = (learned / total) * 100;

            document.getElementById('learnedCount').textContent = `${learned} expression${learned !== 1 ? 's' : ''} learned`;
            document.getElementById('totalCount').textContent = `${total} total`;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        // ==================== EVENT HANDLERS ====================
        function setupEventListeners() {
            // Learned button
            document.getElementById('learnedBtn').addEventListener('click', () => {
                learnedExpressions.add(currentIndex);
                saveToLocalStorage();
                displayExpression(currentIndex);
                updateProgressBar();
            });

            // Review later button
            document.getElementById('reviewBtn').addEventListener('click', () => {
                alert('This expression will appear again tomorrow! Keep learning! 📚');
            });

            // Navigation
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    displayExpression(currentIndex);
                }
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                if (currentIndex < expressions.length - 1) {
                    currentIndex++;
                    displayExpression(currentIndex);
                }
            });

            // Settings modal
            document.getElementById('settingsBtn').addEventListener('click', () => {
                document.getElementById('settingsModal').classList.add('active');

                // Load saved time preference
                const savedTime = localStorage.getItem('notificationTime') || '09:00';
                document.getElementById('notificationTime').value = savedTime;
            });

            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('settingsModal').classList.remove('active');
            });

            document.getElementById('saveSettings').addEventListener('click', () => {
                const time = document.getElementById('notificationTime').value;
                localStorage.setItem('notificationTime', time);
                document.getElementById('settingsModal').classList.remove('active');
                alert(`Settings saved! Daily reminder set for ${time} ✓`);
            });

            // Enable notifications
            document.getElementById('enableNotifications').addEventListener('click', async () => {
                if ('Notification' in window) {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        new Notification('Daily Expression', {
                            body: 'Notifications enabled! You\'ll receive daily reminders to learn new expressions.',
                            icon: '📚'
                        });
                    }
                } else {
                    alert('Your browser doesn\'t support notifications.');
                }
            });

            // Close modal when clicking outside
            document.getElementById('settingsModal').addEventListener('click', (e) => {
                if (e.target.id === 'settingsModal') {
                    document.getElementById('settingsModal').classList.remove('active');
                }
            });
        }

        // ==================== START APP ====================
        init();
    </script>
</body>
</html>
